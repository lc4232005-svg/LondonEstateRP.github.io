<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>London Estate RP - Staff</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars"></div>
    
    <nav>
        <div class="nav-container">
            <button class="admin-btn" onclick="openAdminModal()">ADMIN</button>
            <a href="index.html" class="nav-logo">
                <img src="london-estate-rp-banner.png" alt="London Estate RP Logo">
                <span class="nav-logo-text">London Estate RP</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="staff.html" class="nav-link active">Staff</a>
                <a href="rules.html" class="nav-link">Rules</a>
            </div>
        </div>
    </nav>

    <!-- Admin Login Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content pin-modal">
            <span class="close" onclick="closeAdminModal()">&times;</span>
            <h2>Admin Access</h2>
            <p>Enter PIN code:</p>
            <div class="pin-display" id="pinDisplay">
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
                <span class="pin-dot"></span>
            </div>
            <div class="keypad">
                <button class="keypad-btn" onclick="enterPin(1)">1</button>
                <button class="keypad-btn" onclick="enterPin(2)">2</button>
                <button class="keypad-btn" onclick="enterPin(3)">3</button>
                <button class="keypad-btn" onclick="enterPin(4)">4</button>
                <button class="keypad-btn" onclick="enterPin(5)">5</button>
                <button class="keypad-btn" onclick="enterPin(6)">6</button>
                <button class="keypad-btn" onclick="enterPin(7)">7</button>
                <button class="keypad-btn" onclick="enterPin(8)">8</button>
                <button class="keypad-btn" onclick="enterPin(9)">9</button>
                <button class="keypad-btn clear-btn" onclick="clearPin()">Clear</button>
                <button class="keypad-btn" onclick="enterPin(0)">0</button>
                <button class="keypad-btn submit-btn" onclick="submitPin()">Submit</button>
            </div>
            <p id="errorMessage" class="error"></p>
        </div>
    </div>

    <main>
        <div class="page-header">
            <h1>Our Staff Team</h1>
            <p>Meet the dedicated team behind London Estate RP</p>
        </div>

        <div class="staff-grid" id="staffGrid">
            <!-- Staff members will be loaded dynamically from localStorage -->
        </div>

        <div class="join-staff">
            <h2>Want to join our team?</h2>
            <p>We're always looking for dedicated individuals to help grow our community.</p>
            <a href="https://discord.gg/jZYzh3n5dC" target="_blank" class="discord-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Apply on Discord
            </a>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="admin.js"></script>
</body>
</html>
